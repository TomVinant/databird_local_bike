version: 2

models:
  - name: stg_brands
    description: >
      Staging model for bike brands. Each row represents a unique brand
      available in the catalog.

    columns:
      - name: brand_id
        description: >
          Primary key. Unique identifier for each brand.
        tests:
          - unique
          - not_null

      - name: brand_name
        description: Name of the brand.

  - name: stg_categories
    description: >
      Staging model for product categories. Each row represents a unique
      category used to classify products.

    columns:
      - name: category_id
        description: >
          Primary key. Unique identifier for each category.
        tests:
          - unique
          - not_null

      - name: category_name
        description: Name of the category.

  - name: stg_customers
    description: >
      Staging model for customers. Each row represents a unique customer
      with their contact and address details.

    columns:
      - name: customer_id
        description: >
          Primary key. Unique identifier for each customer.
        tests:
          - unique
          - not_null

      - name: first_name
        description: Customer's first name.

      - name: last_name
        description: Customer's last name.

      - name: phone
        description: Customer's phone number.

      - name: email
        description: Customer's email address.

      - name: street
        description: Street address of the customer.

      - name: city
        description: City of the customer's address.

      - name: state
        description: State of the customer's address (two-letter code).

      - name: zip_code
        description: Postal code of the customer's address.

  - name: stg_order_items
    description: >
      Staging model for order line items. Each row represents one product
      within an order.

      Singular test assert_stg_order_items_total_amount_positive checks that
      quantity * list_price * (1 - discount_pct) is never negative for any
      line item.

    columns:
      - name: order_item_id
        description: >
          Primary key. Surrogate key computed using dbt_utils.generate_surrogate_key
          from the combination of order_id and item_id. Uniquely identifies each
          order-item combination.
        tests:
          - unique
          - not_null

      - name: order_id
        description: >
          Foreign key referencing stg_orders. Identifies the order this item
          belongs to.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id

      - name: item_id
        description: >
          Sequential number identifying each line item within a given order.

      - name: product_id
        description: >
          Foreign key referencing stg_products. Identifies the product
          purchased in this line item.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id

      - name: quantity
        description: Number of units of this product in the order line.

      - name: list_price
        description: Unit list price of the product at the time of sale.

      - name: discount_pct
        description: Discount applied to this line item, expressed as a fraction (e.g. 0.1 = 10%).

  - name: stg_orders
    description: >
      Staging model for orders. Each row represents a single customer order
      and its lifecycle status and key dates.

    columns:
      - name: order_id
        description: >
          Primary key. Unique identifier for each order.
        tests:
          - unique
          - not_null

      - name: customer_id
        description: >
          Foreign key referencing stg_customers. Identifies the customer who
          placed the order.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id

      - name: order_status
        description: >
          Numeric code representing the current status of the order. We
          assume the following statuses: pending, processing, in-store, sent.

      - name: order_date
        description: Date when the order was placed by the customer.

      - name: required_date
        description: Date by which the customer requested the order to be fulfilled.

      - name: store_id
        description: >
          Foreign key referencing stg_stores. Identifies the store that
          received the order.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_stores')
                field: store_id

      - name: staff_id
        description: >
          Foreign key referencing stg_staffs. Identifies the staff member
          who processed the order.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_staffs')
                field: staff_id

      - name: shipped_date
        description: >
          Date when the order was shipped to the customer. NULL if the
          order has not yet shipped.

  - name: stg_products
    description: >
      Staging model for products. Each row represents a unique bike or
      accessory available in the catalog.

    columns:
      - name: product_id
        description: >
          Primary key. Unique identifier for each product.
        tests:
          - unique
          - not_null

      - name: product_name
        description: Name of the product.

      - name: brand_id
        description: >
          Foreign key referencing stg_brands. Identifies the brand of the
          product.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_brands')
                field: brand_id

      - name: category_id
        description: >
          Foreign key referencing stg_categories. Identifies the category
          of the product.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_categories')
                field: category_id

      - name: model_year
        description: Model year of the product.

      - name: list_price
        description: Standard list price of the product.

  - name: stg_staffs
    description: >
      Staging model for staff members. Each row represents a unique
      employee and their store assignment.

    columns:
      - name: staff_id
        description: >
          Primary key. Unique identifier for each staff member.
        tests:
          - unique
          - not_null

      - name: first_name
        description: Staff member's first name.

      - name: last_name
        description: Staff member's last name.

      - name: email
        description: Staff member's email address.

      - name: phone
        description: Staff member's phone number.

      - name: store_id
        description: >
          Foreign key referencing stg_stores. Identifies the store the
          staff member works at.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_stores')
                field: store_id

      - name: is_active
        description: >
          Boolean flag (renamed from the source's active column) indicating
          whether the staff member is currently active.

      - name: manager_id
        description: >
          Foreign key referencing stg_staffs. Identifies the manager of this
          staff member. NULL for staff with no manager.
        tests:
          - relationships:
              arguments:
                to: ref('stg_staffs')
                field: staff_id

  - name: stg_stocks
    description: >
      Staging model for store inventory. Each row represents the quantity
      on hand of a specific product at a specific store.

    columns:
      - name: stock_id
        description: >
          Primary key. Surrogate key computed using dbt_utils.generate_surrogate_key
          from the combination of store_id and product_id. Uniquely identifies each
          store-product combination.
        tests:
          - unique
          - not_null

      - name: store_id
        description: >
          Foreign key referencing stg_stores. Identifies the store holding
          the stock.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_stores')
                field: store_id

      - name: product_id
        description: >
          Foreign key referencing stg_products. Identifies the product
          being stocked.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id

      - name: quantity
        description: Quantity of the product currently in stock at the store.

  - name: stg_stores
    description: >
      Staging model for stores. Each row represents a unique store location
      with its contact and address details.

    columns:
      - name: store_id
        description: >
          Primary key. Unique identifier for each store.
        tests:
          - unique
          - not_null

      - name: store_name
        description: Name of the store.

      - name: phone
        description: Store's phone number.

      - name: email
        description: Store's email address.

      - name: street
        description: Street address of the store.

      - name: city
        description: City of the store's address.

      - name: state
        description: State of the store's address (two-letter code).

      - name: zip_code
        description: Postal code of the store's address.

version: 2

models:
  - name: mart_staff_management
    description: >
      Mart model summarizing store-level performance relative to active
      staff count, over the trailing twelve months (TTM) anchored on
      the most recent order_date in the dataset. Each row represents a
      single store.

    columns:
      - name: store_id
        description: >
          Primary key. Unique identifier for each store.
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('stg_stores')
                field: store_id

      - name: store_name
        description: Name of the store.

      - name: window_end_date
        description: >
          Most recent order_date across all orders, used as the anchor
          date for the trailing twelve-month window.

      - name: total_orders_ttm
        description: Count of distinct orders placed at the store over the TTM window.

      - name: total_items_sold_ttm
        description: Total quantity of items sold at the store over the TTM window.

      - name: total_revenue_ttm
        description: Total order revenue generated by the store over the TTM window.

      - name: active_staff_count
        description: >
          Count of distinct active staff members currently assigned to the
          store, defaulted to 0 when the store has no active staff.

      - name: revenue_per_staff_ttm
        description: >
          total_revenue_ttm divided by active_staff_count. NULL when the
          store has no active staff.

      - name: items_sold_per_staff_ttm
        description: >
          total_items_sold_ttm divided by active_staff_count. NULL when the
          store has no active staff.

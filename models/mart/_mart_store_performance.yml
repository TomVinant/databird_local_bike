version: 2

models:
  - name: mart_store_performance
    description: >
      Mart model summarizing monthly sales and fulfillment performance by
      store. Each row represents a unique store-month combination.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - store_id
              - order_month

    columns:
      - name: store_id
        description: >
          Foreign key referencing stg_stores. Part of the composite primary
          key (store_id + order_month).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_stores')
                field: store_id

      - name: store_name
        description: Name of the store.

      - name: order_month
        description: >
          Calendar month the order was placed in (order_date truncated to
          month). Part of the composite primary key (store_id + order_month).
        tests:
          - not_null

      - name: total_orders
        description: Count of distinct orders placed at the store during the month.

      - name: total_items_sold
        description: Total quantity of items sold at the store during the month.

      - name: total_revenue
        description: Total order revenue generated by the store during the month.

      - name: avg_order_value
        description: >
          total_revenue divided by total_orders. NULL when the store had no
          orders in the month.

      - name: avg_fulfillment_days
        description: >
          Average number of days between order_date and shipped_date, for
          orders that have shipped.

      - name: on_time_delivery_rate
        description: >
          Share of shipped orders that were delivered on or before their
          required_date, as a fraction. NULL when the store had no shipped
          orders in the month.

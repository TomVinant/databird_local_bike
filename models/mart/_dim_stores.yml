version: 2

models:
  - name: dim_stores
    description: >
      Dimension model for stores. Each row represents a unique store
      location with its contact and address details. Used to slice the
      mart fact tables (mart_store_performance, mart_stock_optimization,
      mart_staff_management) by store.

    columns:
      - name: store_id
        description: >
          Primary key. Unique identifier for each store.
        tests:
          - unique
          - not_null

      - name: store_name
        description: Name of the store.

      - name: phone
        description: Store's phone number.

      - name: email
        description: Store's email address.

      - name: street
        description: Street address of the store.

      - name: city
        description: City of the store's address.

      - name: state
        description: State of the store's address (two-letter code).

      - name: zip_code
        description: Postal code of the store's address.

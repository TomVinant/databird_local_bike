version: 2

models:
  - name: dim_categories
    description: >
      Dimension model for product categories. Each row represents a unique
      category used to classify products. Used to slice
      mart_stock_optimization by category.

    columns:
      - name: category_id
        description: >
          Primary key. Unique identifier for each category.
        tests:
          - unique
          - not_null

      - name: category_name
        description: Name of the category.
